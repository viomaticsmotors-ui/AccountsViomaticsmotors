<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Viomatics Live Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f7fa;
}

.header{
background:#1e3a8a;
color:white;
padding:20px;
text-align:center;
}

.container{
padding:20px;
}

.search{
width:100%;
padding:12px;
margin-bottom:15px;
font-size:16px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#2563eb;
color:white;
padding:12px;
}

td{
padding:10px;
border:1px solid #ddd;
}

tr:nth-child(even){
background:#f8fafc;
}

</style>
</head>
<body>

<div class="header">
<h1>VIOMATICS MOTORS ACCOUNTS DASHBOARD  <BR>
Email : viomaticsmotors@gmail.com<br>
PHONE : 9395870636 </h1>
</div>

<div class="container">
<div class="summary">

<div class="card">
<h3>MAIN CAPITAL</h3>
<h2 id="capital">₹150,000</h2>
</div>

<div class="card">
<h3>TOTAL INCOME</h3>
<h2 id="income">₹0</h2>
</div>

<div class="card">
<h3>REMAINING CAPITAL</h3>
<h2 id="remaining">₹0</h2>
</div>

<div class="card">
<h3>PROFIT (+)</h3>
<h2 id="profit">₹0</h2>
</div>

</div>
<input
type="text"
id="search"
class="search"
placeholder="Search..."
>

<table id="sheetTable"></table>

</div>

<script>

const SHEET_ID =
"1Glx-cxlOr_GKjDWhQeqnaMWkieZvaCkbImL8UhhDvsA";

const url =
`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

async function loadData(){

try{

const response =
await fetch(url);

const text =
await response.text();

const json =
JSON.parse(text.substr(47).slice(0,-2));

let html =
"<thead><tr>";

json.table.cols.forEach(col=>{

html +=
`<th>${col.label}</th>`;

});

html +=
"</tr></thead><tbody>";

json.table.rows.forEach(row=>{

html += "<tr>";

row.c.forEach(cell=>{

html +=
`<td>${cell ? cell.v : ""}</td>`;

});

html += "</tr>";

});

html += "</tbody>";

document.getElementById(
"sheetTable"
).innerHTML = html;

}
catch(error){

document.getElementById(
"sheetTable"
).innerHTML =
"<tr><td>Unable to load data</td></tr>";

}

}

loadData();

setInterval(loadData,10000);

document
.getElementById("search")
.addEventListener("keyup",function(){

const value =
this.value.toLowerCase();

document
.querySelectorAll("#sheetTable tbody tr")
.forEach(row=>{

row.style.display =
row.innerText
.toLowerCase()
.includes(value)
? ""
: "none";

});

});

</script>

</body>
</html>
