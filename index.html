<style>

.login-box{
    width:350px;
    margin:100px auto;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,0,0,.1);
}

.login-box h2{
    text-align:center;
}

.login-box input{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

.login-box button{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

#msg{
    color:red;
    text-align:center;
}

</style>

<script>

const USER_ID =
"viomaticsmotors@gmail.com";

const PASSWORD =
"Viomatics@123";

function login(){

    const user =
    document.getElementById("userid").value.trim();

    const pass =
    document.getElementById("password").value.trim();

    const msg =
    document.getElementById("msg");

    let failed =
    parseInt(localStorage.getItem("failedAttempts")) || 0;

    let lockTime =
    localStorage.getItem("lockTime");

    if(lockTime){

        const now = Date.now();

        if(now < Number(lockTime)){

            const hrs =
            Math.ceil(
                (Number(lockTime)-now)
                /(1000*60*60)
            );

            msg.innerHTML =
            "Device Locked. Try again after "
            + hrs +
            " hour(s).";

            return;
        }
        else{

            localStorage.removeItem("lockTime");
            localStorage.removeItem("failedAttempts");

            failed = 0;
        }
    }

    if(
        user === USER_ID &&
        pass === PASSWORD
    ){

        localStorage.setItem(
            "loggedIn",
            "yes"
        );

        document.getElementById("loginPage")
        .style.display = "none";

        document.getElementById("mainPage")
        .style.display = "block";

        loadData();

        return;
    }

    failed++;

    localStorage.setItem(
        "failedAttempts",
        failed
    );

    if(failed >= 2){

        const next24 =
        Date.now() +
        24*60*60*1000;

        localStorage.setItem(
            "lockTime",
            next24
        );

        msg.innerHTML =
        "Too many attempts. Device locked for 24 hours.";
    }
    else{

        msg.innerHTML =
        "Wrong User ID or Password.";
    }

}


window.onload = function(){

    if(
        localStorage.getItem("loggedIn")
        === "yes"
    ){

        document.getElementById("loginPage")
        .style.display = "none";

        document.getElementById("mainPage")
        .style.display = "block";

        loadData();
    }
};


const SHEET_ID =
"1DBdjSigo4VWFmfCgL8Z8B4Xq4ZDKUSWOlv38duO1X20";

const GID =
"315964815";

const url =
`https://docs.google.com/spreadsheets/d/1Glx-cxlOr_GKjDWhQeqnaMWkieZvaCkbImL8UhhDvsA/edit?hl=en-GB&pli=1&gid=0#gid=0`;

async function loadData(){

    try{

        const res =
        await fetch(url);

        const txt =
        await res.text();

        const json =
        JSON.parse(
            txt.substring(47).slice(0,-2)
        );

        let html = "";

        html +=
        "<thead><tr>";

        json.table.cols.forEach(col=>{

            html +=
            `<th>${col.label || ''}</th>`;
        });

        html +=
        "</tr></thead><tbody>";

        json.table.rows.forEach(row=>{

            html += "<tr>";

            json.table.cols.forEach((c,i)=>{

                const cell =
                row.c[i]
                ? row.c[i].v
                : "";

                html +=
                `<td>${cell}</td>`;
            });

            html += "</tr>";
        });

        html += "</tbody>";

        document.getElementById(
            "sheetTable"
        ).innerHTML = html;
    }
    catch(err){

        document.getElementById(
            "sheetTable"
        ).innerHTML =
        "<tr><td>Unable to load Google Sheet</td></tr>";
    }
}

setInterval(loadData,30000);

document.addEventListener("keyup",function(){

    const search =
    document.getElementById("search");

    if(!search) return;

    let value =
    search.value.toLowerCase();

    let rows =
    document.querySelectorAll(
        "#sheetTable tbody tr"
    );

    rows.forEach(row=>{

        row.style.display =
        row.innerText
        .toLowerCase()
        .includes(value)
        ? ""
        : "none";
    });

});

</script>

</body>
