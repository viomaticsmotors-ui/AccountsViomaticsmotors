<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viomatics Motors Finance Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
}

.header{
background:#1e3a8a;
color:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.card h3{
color:#666;
margin-bottom:10px;
}

.amount{
font-size:28px;
font-weight:bold;
color:#1e3a8a;
}

.table-box,
.chart-box{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:6px;
margin-bottom:15px;
}

button{
background:#1e3a8a;
color:white;
border:none;
padding:12px 20px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#162d6d;
}

table{
width:100%;
border-collapse:collapse;
}

table th,
table td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:left;
}

</style>
</head>
<body>

<div class="container">

<div class="header">
<h1>Finance Dashboard</h1>
<p>Daily Transaction Monitor</p>
</div>

<div class="table-box">

<h2>Connect Google Sheet</h2>

<input
type="text"
id="sheetUrl"
placeholder="Paste Google Sheet URL Here">

<button onclick="connectSheet()">
Connect Sheet
</button>

</div>

<div class="cards">

<div class="card">
<h3>Account Balance</h3>
<div class="amount" id="balance">₹0</div>
</div>

<div class="card">
<h3>Today's Income</h3>
<div class="amount" id="income">₹0</div>
</div>

<div class="card">
<h3>Today's Expenses</h3>
<div class="amount" id="expense">₹0</div>
</div>

</div>

<div class="table-box">

<h2>Recent Transactions</h2>
<br>

<input
type="text"
id="search"
placeholder="Search Transaction..."
onkeyup="filterTable()">

<table id="txnTable">

<thead>
<tr>
<th>Date</th>
<th>Description</th>
<th>Amount</th>
</tr>
</thead>

<tbody id="txnBody">
</tbody>

</table>

</div>

<div class="chart-box">

<h2>Income vs Expense</h2>

<canvas id="financeChart"></canvas>

</div>

</div>

<script>

let chart;

function filterTable(){

let input =
document.getElementById("search")
.value.toLowerCase();

let rows =
document.querySelectorAll("#txnBody tr");

rows.forEach(row=>{

let text =
row.innerText.toLowerCase();

row.style.display =
text.includes(input)
? ""
: "none";

});

}

async function connectSheet(){

const sheetUrl =
document.getElementById("sheetUrl")
.value.trim();

if(!sheetUrl){

alert("Paste Google Sheet URL");

return;

}

const match =
sheetUrl.match(/\/d\/([a-zA-Z0-9-_]+)/);

if(!match){

alert("Invalid Sheet URL");

return;

}

const sheetId = match[1];

try{

const dashboard =
await fetch(
`https://opensheet.elk.sh/${sheetId}/Dashboard`
).then(r=>r.json());

if(dashboard.length){

document.getElementById("balance")
.innerHTML =
"₹" +
dashboard[0]["Account Balance"];

document.getElementById("income")
.innerHTML =
"₹" +
dashboard[0]["Today's Income"];

document.getElementById("expense")
.innerHTML =
"₹" +
dashboard[0]["Today's Expenses"];

}

const transactions =
await fetch(
`https://opensheet.elk.sh/${sheetId}/Transactions`
).then(r=>r.json());

const tbody =
document.getElementById("txnBody");

tbody.innerHTML="";

transactions.forEach(txn=>{

tbody.innerHTML += `
<tr>
<td>${txn.Date}</td>
<td>${txn.Description}</td>
<td>₹${txn.Amount}</td>
</tr>
`;

});

const chartData =
await fetch(
`https://opensheet.elk.sh/${sheetId}/ChartData`
).then(r=>r.json());

const labels =
chartData.map(item=>item.Day);

const income =
chartData.map(item=>
Number(item.Income));

const expense =
chartData.map(item=>
Number(item.Expense));

if(chart){
chart.destroy();
}

chart =
new Chart(
document.getElementById("financeChart"),
{
type:"bar",
data:{
labels:labels,
datasets:[
{
label:"Income",
data:income,
backgroundColor:"green"
},
{
label:"Expense",
data:expense,
backgroundColor:"red"
}
]
},
options:{
responsive:true
}
}
);

localStorage.setItem(
"sheetUrl",
sheetUrl
);

}
catch(error){

console.error(error);

alert(
"Cannot load Google Sheet. Make sure it is published."
);

}

}

window.onload=()=>{

const saved =
localStorage.getItem("sheetUrl");

if(saved){

document.getElementById("sheetUrl")
.value = saved;

connectSheet();

setInterval(
connectSheet,
30000
);

}

};

</script>

</body>
</html>
